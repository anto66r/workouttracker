<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Floppy ears -->
  <ellipse cx="18" cy="38" rx="14" ry="22" fill="#c8873a" transform="rotate(-15 18 38)"/>
  <ellipse cx="82" cy="38" rx="14" ry="22" fill="#c8873a" transform="rotate(15 82 38)"/>
  <!-- Inner ear -->
  <ellipse cx="18" cy="40" rx="8" ry="14" fill="#e8a86a" transform="rotate(-15 18 40)"/>
  <ellipse cx="82" cy="40" rx="8" ry="14" fill="#e8a86a" transform="rotate(15 82 40)"/>
  <!-- Head -->
  <ellipse cx="50" cy="52" rx="36" ry="34" fill="#d4944a"/>
  <!-- Forehead patch -->
  <ellipse cx="50" cy="36" rx="22" ry="14" fill="#c8873a"/>
  <!-- Eyes -->
  <ellipse cx="37" cy="44" rx="8" ry="9" fill="white"/>
  <ellipse cx="63" cy="44" rx="8" ry="9" fill="white"/>
  <circle cx="39" cy="45" r="5.5" fill="#2a1a0a"/>
  <circle cx="65" cy="45" r="5.5" fill="#2a1a0a"/>
  <!-- Eye shine -->
  <circle cx="41" cy="43" r="2" fill="white"/>
  <circle cx="67" cy="43" r="2" fill="white"/>
  <!-- Eyebrows (worried/funny) -->
  <path d="M29 36 Q37 30 45 36" stroke="#7a4a1a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M55 36 Q63 30 71 36" stroke="#7a4a1a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Snout -->
  <ellipse cx="50" cy="63" rx="18" ry="13" fill="#e8a86a"/>
  <!-- Nose -->
  <ellipse cx="50" cy="57" rx="8" ry="5.5" fill="#2a1a0a"/>
  <ellipse cx="48" cy="55.5" rx="2.5" ry="1.5" fill="#4a3a2a" opacity="0.5"/>
  <!-- Big goofy tongue -->
  <path d="M42 68 Q50 64 58 68 Q60 78 50 82 Q40 78 42 68Z" fill="#e05a7a"/>
  <path d="M50 68 Q50 82 50 82" stroke="#c0405a" stroke-width="1.5" fill="none"/>
  <!-- Cheek blush -->
  <ellipse cx="26" cy="60" rx="8" ry="5" fill="#e06060" opacity="0.35"/>
  <ellipse cx="74" cy="60" rx="8" ry="5" fill="#e06060" opacity="0.35"/>
</svg>
